  "paths": {
    "/ai/text-to-cad/{output_format}": {
      "post": {
        "description": "Because our source of truth for the resulting model is a STEP file, you will always have STEP file contents when you list your generated parts. Any other formats you request here will also be returned when you list your generated parts.\n\nThis operation is performed asynchronously, the `id` of the operation will be returned. You can use the `id` returned from the request to get status information about the async operation from the `/async/operations/{id}` endpoint.\n\nOne thing to note, if you hit the cache, this endpoint will return right away. So you only have to wait if the status is not `Completed` or `Failed`.",
        "operationId": "create_text_to_cad",
        "parameters": [
          {
            "description": "The format the output file should be converted to.",
            "in": "path",
            "name": "output_format",
            "required": true,
            "schema": {
              "$ref": "#/components/schemas/FileExportFormat"
            }
          },
          {
            "description": "If we should output the kcl for the model.",
            "in": "query",
            "name": "kcl",
            "schema": {
              "nullable": true,
              "type": "boolean"
            }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/TextToCadCreateBody"
              }
            }
          },
          "required": true
        },
        "responses": {
          "201": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/TextToCad"
                }
              }
            },
            "description": "successful creation",
            "headers": {
              "Access-Control-Allow-Credentials": {
                "description": "Access-Control-Allow-Credentials header.",
                "schema": {
                  "nullable": true,
                  "type": "string"
                },
                "style": "simple"
              },
              "Access-Control-Allow-Headers": {
                "description": "Access-Control-Allow-Headers header. This is a comma-separated list of headers.",
                "schema": {
                  "nullable": true,
                  "type": "string"
                },
                "style": "simple"
              },
              "Access-Control-Allow-Methods": {
                "description": "Access-Control-Allow-Methods header.",
