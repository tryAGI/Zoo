        "parameters": [
          {
            "description": "Maximum number of items returned by a single call",
            "in": "query",
            "name": "limit",
            "schema": {
              "format": "uint32",
              "minimum": 1,
              "nullable": true,
              "type": "integer"
            }
          },
          {
            "description": "Token returned by previous call to retrieve the subsequent page",
            "in": "query",
            "name": "page_token",
            "schema": {
              "nullable": true,
              "type": "string"
            }
          },
          {
            "in": "query",
            "name": "sort_by",
